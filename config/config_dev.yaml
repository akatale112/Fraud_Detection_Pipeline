env: dev

databricks:
  # Logical location for this project's tables (adjust to your workspace)
  catalog: workspace     # use 'workspace' catalog on free edition
  schema: fraud          # database/schema name for this project

storage:
  # Use Volumes path (no /mnt on free edition). Same volume as CSV is fine for dev.
  base_path: /Volumes/workspace/fraud/fraud_data
  raw_path: /Volumes/workspace/fraud/fraud_data/raw
  bronze_path: /Volumes/workspace/fraud/fraud_data/bronze
  silver_path: /Volumes/workspace/fraud/fraud_data/silver
  gold_path: /Volumes/workspace/fraud/fraud_data/gold

tables:
  bronze_transactions: bronze_transactions
  silver_transactions: silver_transactions
  gold_fraud_daily_summary: gold_fraud_daily_summary
  gold_transaction_scores: gold_transaction_scores

kafka:
  bootstrap_servers: localhost:9092   # override with real broker(s) in your env
  topic_transactions: transactions
  security:
    # For dev we assume no security; for prod use SASL/SSL configs.
    sasl_mechanism: null
    sasl_username: null
    sasl_password: null
    security_protocol: PLAINTEXT

data_sources:
  kaggle_credit_card_csv: /Volumes/workspace/fraud/fraud_data/creditcard.csv
  # Update the above path once the dataset is uploaded.

real_time_inference:
  model_name: fraud_detection_model
  serving_endpoint: null

ml:
  training_data_path: /Volumes/workspace/fraud/fraud_data/silver_transactions.parquet
# Optional: when cluster has CONFIG_NOT_AVAILABLE (spark.mlflow.modelRegistryUri), export
# silver_transactions to this path (CSV or Parquet) and run training via standalone script.
# ml:
#   training_data_path: /Volumes/workspace/fraud/fraud_data/export/silver.parquet

